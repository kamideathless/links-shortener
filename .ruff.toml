line-length = 119
indent-width = 4
target-version = "py311"
exclude = [
    ".venv", ".git", "__pypackages__", "build", "dist",
    ".mypy_cache", ".ruff_cache", ".pytest_cache",
]

[lint]
select = ["E4", "E7", "E9", "F"]
fixable = ["ALL"]
unfixable = ["F401"]
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
quote-style = "single"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"